name: Build Windows Pake App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Pake
        run: pnpm add -g pake-cli

      - name: Build app
        run: pake https://example.com --name "Test App"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: pake-windows
          path: |
            ${{ github.workspace }}\*.msi
            ${{ github.workspace }}\*.exe
